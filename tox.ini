[tox]
envlist=
    py{310,311,312,313,314}-core
    py310-lint
    py{310,311,312,313,314}-wheel
    docs

[testenv]
usedevelop=True
commands_pre=
    uv pip install --upgrade pip
    uv pip install --group dev -e .
commands=
    core: pytest {posargs}
basepython=
    docs: python
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
allowlist_externals=
    make
    pre-commit
    pytest
    uv

[testenv:py310-lint]
deps=pre-commit
setenv=
    PYTHONPATH={envsitepackagesdir}{:}{env:PYTHONPATH:}
commands=
    pre-commit install
    pre-commit run --all-files --show-diff-on-failure

[testenv:py{310,311,312,313,314}-core]
commands=
    pytest {posargs}

[testenv:py{310,311,312,313,314}-wheel]
deps =
    build
    pytest
allowlist_externals =
    uv
    pytest
commands_pre =
    uv pip install --upgrade pip
commands =
    python -m build -w
    python -c "import pathlib, subprocess, sys; d = pathlib.Path(r'{toxinidir}') / 'dist'; w = sorted(d.glob('py_ipld_dag-*.whl')); len(w) == 1 or sys.exit(f'Expected exactly one py_ipld_dag-*.whl in dist, got {len(w)}'); subprocess.run(['uv', 'pip', 'install', '--force-reinstall', str(w[0].resolve())], check=True)"
    pytest {posargs}

[testenv:docs]
# Install dev group (includes docs) for Sphinx (docs/conf.py)
commands_pre=
    uv pip install --upgrade pip
    uv pip install --group dev -e .
allowlist_externals=
    make
    uv
commands=
    make docs-ci
